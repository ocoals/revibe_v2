name: closet_iq
description: "AI Fashion Wardrobe Management - RE:VIBE"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.0

  # Routing
  go_router: ^14.0.0

  # Image Processing
  image_picker: ^1.1.0
  image: ^4.3.0

  # UI
  cached_network_image: ^3.4.0
  table_calendar: ^3.1.0
  flutter_staggered_grid_view: ^0.7.0

  # HTTP
  http: ^1.2.0

  # URL
  url_launcher: ^6.2.0

  # In-App Purchase
  purchases_flutter: ^8.0.0

  # Utility
  freezed_annotation: ^2.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  freezed: any
  json_serializable: any
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "files/Android-PlayStore-512x512.png"
  image_path_ios: "files/iOS-AppStore-1024x1024.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  # iOS: white-only (no image) to prevent double splash
  # Android: splash logo
  image_android: "files/splash-logo.png"
  image_dark_android: "files/splash-logo.png"
  android_12:
    color: "#FFFFFF"
    image: "files/splash-logo.png"
    color_dark: "#FFFFFF"
    image_dark: "files/splash-logo.png"

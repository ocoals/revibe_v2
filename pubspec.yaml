name: closet_iq
description: "AI Fashion Wardrobe Management - ClosetIQ"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.0

  # Routing
  go_router: ^14.0.0

  # Image Processing
  image_picker: ^1.1.0
  image: ^4.3.0

  # UI
  cached_network_image: ^3.4.0
  table_calendar: ^3.1.0

  # HTTP
  http: ^1.2.0

  # URL
  url_launcher: ^6.2.0

  # In-App Purchase
  purchases_flutter: ^8.0.0

  # Utility
  freezed_annotation: ^2.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  freezed: any
  json_serializable: any

flutter:
  uses-material-design: true
